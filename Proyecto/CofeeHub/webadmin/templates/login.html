<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - Coffee Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="logo-big"><i class="fas fa-mug-saucer"></i></div>
    <h1>COFFEE <span>HUB</span></h1>
    <p class="sub">Administra, sirve y disfruta</p>

    {% with mensajes = get_flashed_messages(with_categories=true) %}
      {% if mensajes %}
      <div class="mensajes">
        {% for categoria, texto in mensajes %}
          <div class="mensaje {{ categoria }}">{{ texto }}</div>
        {% endfor %}
      </div>
      {% endif %}
    {% endwith %}

    <form method="post">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" name="correo" required>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="contrasena" required>
      </div>
      <button class="btn-primary" type="submit" style="width:100%;justify-content:center;">Iniciar sesión</button>
    </form>
  </div>
</body>
</html>
