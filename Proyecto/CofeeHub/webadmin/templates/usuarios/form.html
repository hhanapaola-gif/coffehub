{% extends "base.html" %}
{% block titulo %}{{ 'Editar' if usuario else 'Nuevo' }} usuario - Coffee Hub{% endblock %}
{% block encabezado %}{{ 'EDITAR USUARIO' if usuario else 'NUEVO USUARIO' }}{% endblock %}

{% block contenido %}
<div class="card" style="max-width:600px;">
  <form method="post">
    <div class="form-group">
      <label>Nombre completo</label>
      <input type="text" name="nombre" value="{{ usuario.nombre if usuario else '' }}" placeholder="Ej. María García López" required>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label>Apellido paterno</label>
        <input type="text" name="apellido_pat" value="{{ usuario.apellido_pat if usuario else '' }}" required>
      </div>
      <div class="form-group">
        <label>Apellido materno</label>
        <input type="text" name="apellido_mat" value="{{ usuario.apellido_mat if usuario else '' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" name="correo" value="{{ usuario.correo if usuario else '' }}" placeholder="correo@coffeehub.com" required>
    </div>
    <div class="form-group">
      <label>Contraseña {{ '(dejar en blanco para no cambiarla)' if usuario else '' }}</label>
      <div class="password-wrapper">
        <input type="password" id="password-input" name="contrasena" placeholder="Mínimo 8 caracteres" {{ 'required' if not usuario else '' }}>
        <button type="button" class="toggle" onclick="togglePassword()"><i class="fas fa-eye" id="password-icon"></i></button>
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label>Rol</label>
        <select name="id_rol">
          {% for r in roles %}
          <option value="{{ r.id }}" {{ 'selected' if usuario and usuario.rol.id == r.id }}>{{ r.nombre }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Estado</label>
        <label class="form-check" style="margin-top:12px;">
          <input type="checkbox" name="estatus" {{ 'checked' if not usuario or usuario.estatus }}> Activo
        </label>
      </div>
    </div>

    <div style="display:flex;gap:12px;margin-top:8px;">
      <button type="submit" class="btn-primary" style="flex:1;justify-content:center;">Guardar Usuario</button>
      <a class="btn-secondary" style="flex:1;justify-content:center;" href="{{ url_for('usuarios.listar') }}">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
  function togglePassword() {
    const input = document.getElementById('password-input');
    const icon = document.getElementById('password-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'fas fa-eye';
    }
  }
</script>
{% endblock %}
