{% extends "base.html" %}
{% block titulo %}{{ 'Editar' if ingrediente else 'Nuevo' }} ingrediente - Coffee Hub{% endblock %}
{% block encabezado %}{{ 'EDITAR INGREDIENTE' if ingrediente else 'NUEVO INGREDIENTE' }}{% endblock %}

{% block contenido %}
<div class="card" style="max-width:480px;">
  <form method="post">
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" name="nombre" value="{{ ingrediente.nombre if ingrediente else '' }}" required>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label>Existencia actual</label>
        <input type="number" step="0.01" name="stock_actual" value="{{ ingrediente.stock_actual if ingrediente else '' }}" required>
      </div>
      <div class="form-group">
        <label>Stock mínimo</label>
        <input type="number" step="0.01" name="stock_minimo" value="{{ ingrediente.stock_minimo if ingrediente else '' }}" required>
      </div>
    </div>
    <div class="form-group">
      <label>Unidad de medida</label>
      <input type="text" name="unidad_medida" value="{{ ingrediente.unidad_medida if ingrediente else '' }}" placeholder="g, ml, piezas..." required>
    </div>

    <div style="display:flex;gap:12px;margin-top:8px;">
      <button type="submit" class="btn-primary" style="flex:1;justify-content:center;">Guardar</button>
      <a class="btn-secondary" style="flex:1;justify-content:center;" href="{{ url_for('inventario.listar') }}">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
