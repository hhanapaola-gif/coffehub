{% extends "base.html" %}
{% block titulo %}{{ 'Editar' if promocion else 'Nueva' }} promoción - Coffee Hub{% endblock %}
{% block encabezado %}{{ 'EDITAR PROMOCIÓN' if promocion else 'NUEVA PROMOCIÓN' }}{% endblock %}

{% block contenido %}
<div class="card" style="max-width:560px;">
  <form method="post">
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" name="nombre" value="{{ promocion.nombre if promocion else '' }}" required>
    </div>
    <div class="form-group">
      <label>Descripción / condiciones</label>
      <textarea name="descripcion" rows="2">{{ promocion.descripcion if promocion else '' }}</textarea>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label>Descuento (%)</label>
        <input type="number" step="0.01" name="descuento" value="{{ promocion.descuento if promocion else '' }}" required>
      </div>
      <div class="form-group">
        <label>Compra mínima ($)</label>
        <input type="number" step="0.01" name="monto_minimo" value="{{ promocion.monto_minimo if promocion else 0 }}">
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label>Fecha inicio</label>
        <input type="date" name="fecha_inicio" value="{{ promocion.fecha_inicio if promocion else '' }}" required>
      </div>
      <div class="form-group">
        <label>Fecha fin</label>
        <input type="date" name="fecha_fin" value="{{ promocion.fecha_fin if promocion else '' }}" required>
      </div>
    </div>
    <div class="form-group">
      <label class="form-check"><input type="checkbox" name="estatus" {{ 'checked' if not promocion or promocion.estatus }}> Activa</label>
    </div>

    <div style="display:flex;gap:12px;margin-top:8px;">
      <button type="submit" class="btn-primary" style="flex:1;justify-content:center;">Guardar</button>
      <a class="btn-secondary" style="flex:1;justify-content:center;" href="{{ url_for('promociones.listar') }}">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
